{% extends 'base.html' %}
{% block title %}Modifier {{ niveau.nom }}{% endblock %}
{% block page_title %}Modifier le niveau{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>Modifier — {{ niveau.nom }}</h1></div>
  <a href="{% url 'liste_niveaux' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Retour
  </a>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Nom du niveau</label>
        <input type="text" name="nom" class="form-control"
               value="{{ niveau.nom }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Ordre d'affichage</label>
        <input type="number" name="ordre" class="form-control"
               value="{{ niveau.ordre }}" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Type d'ecole</label>
        <select name="type_ecole" class="form-control">
          <option value="PRIVE"
            {% if niveau.type_ecole == 'PRIVE' %}selected{% endif %}>
            Prive
          </option>
          <option value="PUBLIC"
            {% if niveau.type_ecole == 'PUBLIC' %}selected{% endif %}>
            Public
          </option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Systeme de notation</label>
        <select name="systeme" class="form-control">
          <option value="TRIMESTRIEL"
            {% if niveau.systeme == 'TRIMESTRIEL' %}selected{% endif %}>
            Trimestriel (T1/T2/T3)
          </option>
          <option value="SEMESTRIEL"
            {% if niveau.systeme == 'SEMESTRIEL' %}selected{% endif %}>
            Semestriel (S1/S2)
          </option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control"
               value="{{ niveau.description }}">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Enregistrer
        </button>
        <a href="{% url 'liste_niveaux' %}" class="btn btn-secondary">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
