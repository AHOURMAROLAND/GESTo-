<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GESTo — Gestion Scolaire Togo</title>
</head>
<body style="font-family:Arial;padding:40px;background:#EFF6FF">
  <div style="background:white;padding:32px;border-radius:12px;
              max-width:620px;margin:auto;border:1px solid #BFDBFE">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <div style="width:48px;height:48px;background:#2563EB;border-radius:10px;
                  display:flex;align-items:center;justify-content:center;
                  color:white;font-size:22px;font-weight:700">G</div>
      <div>
        <h1 style="margin:0;color:#1E40AF;font-size:20px">GESTo</h1>
        <p style="margin:0;color:#64748B;font-size:13px">
          Gestion Scolaire Togo — Ste Bakhita
        </p>
      </div>
    </div>

    <div style="background:#F0FDF4;border:1px solid #86EFAC;border-radius:8px;
                padding:12px 16px;margin-bottom:20px">
      <p style="margin:0;color:#166534;font-weight:600">
        ✅ E1 — Fondations OK (5%)
      </p>
      <p style="margin:4px 0 0;color:#16A34A;font-size:13px">
        Django 5.1 · 10 apps · SQLite · django-q · WASenderAPI ready
      </p>
    </div>

    <table style="width:100%;font-size:13px;border-collapse:collapse">
      <tr style="border-bottom:1px solid #F1F5F9">
        <td style="padding:8px 0;color:#64748B">Utilisateur connecté</td>
        <td style="padding:8px 0;font-weight:600">{{ request.user }}</td>
      </tr>
      <tr style="border-bottom:1px solid #F1F5F9">
        <td style="padding:8px 0;color:#64748B">Rôle</td>
        <td style="padding:8px 0;font-weight:600">{{ request.user.role }}</td>
      </tr>
      <tr>
        <td style="padding:8px 0;color:#64748B">Prochaine étape</td>
        <td style="padding:8px 0;font-weight:600;color:#2563EB">
          E2 — Auth & Login par rôle
        </td>
      </tr>
    </table>

    <div style="margin-top:20px;display:flex;gap:10px">
      <a href="/admin/"
         style="background:#2563EB;color:white;padding:10px 20px;
                border-radius:8px;text-decoration:none;font-size:13px">
        Admin Django
      </a>
      <a href="/logout/"
         style="background:#FEE2E2;color:#991B1B;padding:10px 20px;
                border-radius:8px;text-decoration:none;font-size:13px">
        Déconnexion
      </a>
    </div>
  </div>
</body>
</html>
