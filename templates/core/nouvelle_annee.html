{% extends 'base.html' %}
{% block title %}Nouvelle annee{% endblock %}
{% block page_title %}Nouvelle annee scolaire{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Nouvelle annee scolaire</h1>
  </div>
  <a href="{% url 'liste_annees' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Retour
  </a>
</div>
<div class="card" style="max-width:500px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Nom de l'annee</label>
        <input type="text" name="nom" class="form-control"
               placeholder="Ex: 2025-2026" required>
        <p style="font-size:12px;color:var(--text-muted);margin-top:4px">
          Format recommande : 2025-2026
        </p>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Date debut</label>
          <input type="date" name="date_debut" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Date fin</label>
          <input type="date" name="date_fin" class="form-control">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Creer
        </button>
        <a href="{% url 'liste_annees' %}" class="btn btn-secondary">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
