<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GESTo — Connexion</title>
</head>
<body style="font-family:Arial;padding:40px;background:#EFF6FF">
  <div style="background:white;padding:32px;border-radius:12px;
              max-width:400px;margin:auto;border:1px solid #BFDBFE">
    <h2 style="color:#1E40AF;margin-bottom:24px">GESTo — Connexion</h2>
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;color:#475569;margin-bottom:6px">
          Nom d'utilisateur
        </label>
        <input type="text" name="username" required
               style="width:100%;padding:10px;border:1px solid #CBD5E1;
                      border-radius:8px;font-size:14px;box-sizing:border-box">
      </div>
      <div style="margin-bottom:24px">
        <label style="display:block;font-size:13px;color:#475569;margin-bottom:6px">
          Mot de passe
        </label>
        <input type="password" name="password" required
               style="width:100%;padding:10px;border:1px solid #CBD5E1;
                      border-radius:8px;font-size:14px;box-sizing:border-box">
      </div>
      {% if form.errors %}
      <div style="background:#FEE2E2;color:#991B1B;padding:10px;
                  border-radius:8px;font-size:13px;margin-bottom:16px">
        Identifiants incorrects.
      </div>
      {% endif %}
      <button type="submit"
              style="width:100%;padding:12px;background:#2563EB;color:white;
                     border:none;border-radius:8px;font-size:14px;cursor:pointer">
        Se connecter
      </button>
    </form>
  </div>
</body>
</html>
