{% extends 'base.html' %}
{% block title %}Changer mot de passe{% endblock %}
{% block page_title %}Changer mot de passe{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;margin:auto">
  <div class="card-header">
    <h5>Nouveau mot de passe</h5>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Ancien mot de passe</label>
        <input type="password" class="form-control" name="ancien_mdp" required>
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input type="password" class="form-control" name="nouveau_mdp" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le nouveau mot de passe</label>
        <input type="password" class="form-control" name="confirmation_mdp" required>
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
      </div>
    </form>
    <div class="mt-3 text-center">
      <a href="{% url 'dashboard' %}" class="fs-13 text-primary fw-600" style="text-decoration:none">Retour au tableau de bord</a>
    </div>
  </div>
</div>
{% endblock %}
