<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GESTo — Changer mot de passe</title>
  <style>
    body{font-family:Arial,sans-serif;background:#F1F5F9;
         display:flex;align-items:center;justify-content:center;
         min-height:100vh;padding:20px}
    .card{background:#fff;border-radius:12px;padding:32px;
          width:100%;max-width:420px;border:1px solid #E2E8F0}
    h2{color:#1E40AF;margin-bottom:24px;font-size:18px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;
                 color:#374151;margin-bottom:6px}
    .field input{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;
                 border-radius:8px;font-size:14px;outline:none;box-sizing:border-box}
    .field input:focus{border-color:#1E40AF}
    .msg-ok{background:#DCFCE7;color:#166534;padding:10px;
            border-radius:8px;font-size:13px;margin-bottom:16px}
    .msg-err{background:#FEE2E2;color:#991B1B;padding:10px;
             border-radius:8px;font-size:13px;margin-bottom:16px}
    .btn{width:100%;padding:12px;background:#1E40AF;color:#fff;
         border:none;border-radius:8px;font-size:14px;cursor:pointer}
    .btn:hover{background:#1D4ED8}
    .retour{display:block;text-align:center;margin-top:16px;
            font-size:13px;color:#1E40AF;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <h2>Changer le mot de passe</h2>
  {% for msg in messages %}
  <div class="{% if msg.tags == 'success' %}msg-ok{% else %}msg-err{% endif %}">
    {{ msg }}
  </div>
  {% endfor %}
  <form method="post">
    {% csrf_token %}
    <div class="field">
      <label>Ancien mot de passe</label>
      <input type="password" name="ancien_mdp" required>
    </div>
    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" name="nouveau_mdp" required minlength="6">
    </div>
    <div class="field">
      <label>Confirmer le nouveau mot de passe</label>
      <input type="password" name="confirmation_mdp" required>
    </div>
    <button type="submit" class="btn">Enregistrer</button>
  </form>
  <a href="/" class="retour">Retour au tableau de bord</a>
</div>
</body>
</html>
