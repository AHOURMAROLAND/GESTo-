<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GESTo — Mon profil</title>
  <style>
    body{font-family:Arial,sans-serif;background:#F1F5F9;padding:40px}
    .card{background:#fff;border-radius:12px;padding:32px;
          max-width:600px;margin:auto;border:1px solid #E2E8F0}
    h2{color:#1E40AF;margin-bottom:24px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;
                 color:#374151;margin-bottom:6px}
    .field input{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;
                 border-radius:8px;font-size:14px;outline:none;box-sizing:border-box}
    .field input:focus{border-color:#1E40AF}
    .badge{display:inline-block;padding:4px 12px;background:#DBEAFE;
           color:#1E40AF;border-radius:20px;font-size:12px;font-weight:600}
    .btn{padding:11px 24px;background:#1E40AF;color:#fff;border:none;
         border-radius:8px;font-size:14px;cursor:pointer}
    .msg-ok{background:#DCFCE7;color:#166534;padding:10px;
            border-radius:8px;font-size:13px;margin-bottom:16px}
    .retour{display:inline-block;margin-top:16px;font-size:13px;
            color:#1E40AF;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <h2>Mon profil</h2>
  <p style="margin-bottom:20px">
    <span class="badge">{{ request.user.get_role_display }}</span>
    &nbsp;{{ request.user.username }}
  </p>
  {% for msg in messages %}
  <div class="msg-ok">{{ msg }}</div>
  {% endfor %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="field">
      <label>Prenom</label>
      <input type="text" name="first_name" value="{{ request.user.first_name }}">
    </div>
    <div class="field">
      <label>Nom</label>
      <input type="text" name="last_name" value="{{ request.user.last_name }}">
    </div>
    <div class="field">
      <label>Telephone</label>
      <input type="text" name="telephone" value="{{ request.user.telephone }}">
    </div>
    <div class="field">
      <label>Adresse</label>
      <input type="text" name="adresse" value="{{ request.user.adresse }}">
    </div>
    <div class="field">
      <label>Photo</label>
      <input type="file" name="photo" accept="image/*">
    </div>
    <button type="submit" class="btn">Enregistrer</button>
  </form>
  <a href="/" class="retour">Retour au tableau de bord</a>
  &nbsp;|&nbsp;
  <a href="/changer-mot-de-passe/" class="retour">Changer mon mot de passe</a>
</div>
</body>
</html>
