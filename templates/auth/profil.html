{% extends 'base.html' %}
{% block title %}Mon profil{% endblock %}
{% block page_title %}Mon profil{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;margin:auto">
  <div class="card-header">
    <h5>Mon profil</h5>
  </div>
  <div class="card-body">
    <p class="mb-4">
      <span class="badge badge-primary">{{ request.user.get_role_display }}</span>
      &nbsp;<strong>{{ request.user.username }}</strong>
    </p>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Prénom</label>
        <input type="text" class="form-control" name="first_name" value="{{ request.user.first_name }}">
      </div>
      <div class="form-group">
        <label class="form-label">Nom</label>
        <input type="text" class="form-control" name="last_name" value="{{ request.user.last_name }}">
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input type="text" class="form-control" name="telephone" value="{{ request.user.telephone|default:'' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Adresse</label>
        <input type="text" class="form-control" name="adresse" value="{{ request.user.adresse|default:'' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Photo</label>
        <input type="file" class="form-control" name="photo" accept="image/*">
      </div>
      
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary" style="margin-left:8px">Retour</a>
        <a href="{% url 'changer_mot_de_passe' %}" class="btn btn-secondary" style="margin-left:8px">Changer mon mot de passe</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
