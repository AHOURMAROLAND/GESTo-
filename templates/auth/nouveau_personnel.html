{% extends 'base.html' %}
{% block title %}Nouveau personnel{% endblock %}
{% block page_title %}Nouveau membre du personnel{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;margin:auto">
  <div class="card-header">
    <h5>Créer un compte</h5>
  </div>
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Prénom <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="first_name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nom <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="last_name" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Rôle <span class="text-danger">*</span></label>
        <select class="form-control" name="role" required>
          <option value="">Choisir un rôle...</option>
          {% for code, label in roles %}
          <option value="{{ code }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="text" class="form-control" name="telephone" placeholder="+228XXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp</label>
          <input type="text" class="form-control" name="telephone_wa" placeholder="+228XXXXXXXX">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Spécialité / Matière</label>
        <input type="text" class="form-control" name="specialite" placeholder="Ex: Mathématiques">
      </div>
      <div class="form-group">
        <label class="form-label">Photo</label>
        <input type="file" class="form-control" name="photo" accept="image/*">
      </div>
      <div class="mt-4">
        <button type="submit" class="btn btn-primary">Créer le compte</button>
        <a href="{% url 'liste_personnel' %}" class="btn btn-secondary" style="margin-left:8px">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
