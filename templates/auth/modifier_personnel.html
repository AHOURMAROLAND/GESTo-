{% extends 'base.html' %}
{% block title %}Modifier {{ personne.nom_complet }}{% endblock %}
{% block page_title %}Modifier {{ personne.nom_complet }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;margin:auto">
  <div class="card-header">
    <h5>Modifier les informations</h5>
  </div>
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" class="form-control" name="first_name" value="{{ personne.first_name }}">
        </div>
        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control" name="last_name" value="{{ personne.last_name }}">
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Téléphone</label>
          <input type="text" class="form-control" name="telephone" value="{{ personne.telephone }}">
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp</label>
          <input type="text" class="form-control" name="telephone_wa" value="{{ personne.telephone_wa }}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Spécialité</label>
        <input type="text" class="form-control" name="specialite" value="{{ personne.specialite }}">
      </div>
      <div class="form-group">
        <label class="form-label">Adresse</label>
        <input type="text" class="form-control" name="adresse" value="{{ personne.adresse }}">
      </div>
      <div class="form-group">
        <label class="form-label">Photo</label>
        <input type="file" class="form-control" name="photo" accept="image/*">
      </div>
      
      <hr style="border-top:1px solid var(--border-color);margin:24px 0">
      
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe (laisser vide pour ne pas changer)</label>
        <input type="password" class="form-control" name="new_password" minlength="6">
        <p class="text-muted fs-12 mt-1">Minimum 6 caractères</p>
      </div>

      <div class="mt-4">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'detail_personnel' personne.pk %}" class="btn btn-secondary" style="margin-left:8px">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
