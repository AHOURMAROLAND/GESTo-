<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GESTo — Modifier {{ personne.nom_complet }}</title>
  <style>
    body{font-family:Arial,sans-serif;background:#F1F5F9;padding:40px}
    .card{background:#fff;border-radius:12px;padding:32px;
          max-width:600px;margin:auto;border:1px solid #E2E8F0}
    h2{color:#1E40AF;margin-bottom:24px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;
                 color:#374151;margin-bottom:6px}
    .field input,.field select{width:100%;padding:10px 14px;
      border:1.5px solid #E2E8F0;border-radius:8px;font-size:14px;
      outline:none;box-sizing:border-box}
    .field input:focus{border-color:#1E40AF}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .btn{padding:11px 24px;background:#1E40AF;color:#fff;border:none;
         border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px}
    .btn-sec{padding:11px 24px;background:#F1F5F9;color:#374151;
             border:1px solid #E2E8F0;border-radius:8px;font-size:14px;
             cursor:pointer;text-decoration:none}
    .msg-err{background:#FEE2E2;color:#991B1B;padding:10px;
             border-radius:8px;font-size:13px;margin-bottom:16px}
    .sep{border:none;border-top:1px solid #F1F5F9;margin:20px 0}
    .note{font-size:12px;color:#94A3B8;margin-top:4px}
  </style>
</head>
<body>
<div class="card">
  <h2>Modifier — {{ personne.nom_complet }}</h2>
  {% for msg in messages %}
  <div class="msg-err">{{ msg }}</div>
  {% endfor %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
      <div class="field">
        <label>Prenom</label>
        <input type="text" name="first_name" value="{{ personne.first_name }}">
      </div>
      <div class="field">
        <label>Nom</label>
        <input type="text" name="last_name" value="{{ personne.last_name }}">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Telephone</label>
        <input type="text" name="telephone" value="{{ personne.telephone }}">
      </div>
      <div class="field">
        <label>WhatsApp</label>
        <input type="text" name="telephone_wa" value="{{ personne.telephone_wa }}">
      </div>
    </div>
    <div class="field">
      <label>Specialite</label>
      <input type="text" name="specialite" value="{{ personne.specialite }}">
    </div>
    <div class="field">
      <label>Adresse</label>
      <input type="text" name="adresse" value="{{ personne.adresse }}">
    </div>
    <div class="field">
      <label>Photo</label>
      <input type="file" name="photo" accept="image/*">
    </div>
    <hr class="sep">
    <div class="field">
      <label>Nouveau mot de passe (laisser vide pour ne pas changer)</label>
      <input type="password" name="new_password" minlength="6">
      <p class="note">Minimum 6 caracteres</p>
    </div>
    <div style="margin-top:8px">
      <button type="submit" class="btn">Enregistrer</button>
      <a href="{% url 'detail_personnel' personne.pk %}" class="btn-sec">
        Annuler
      </a>
    </div>
  </form>
</div>
</body>
</html>
