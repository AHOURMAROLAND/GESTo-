{% extends 'base.html' %}
{% block title %}Nouvel eleve{% endblock %}
{% block page_title %}Inscription nouvel eleve{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Nouvel eleve</h1>
    <p>Annee {{ annee.nom }}</p>
  </div>
  <a href="{% url 'liste_eleves' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Retour
  </a>
</div>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <div class="grid-2">

    <div class="card">
      <div class="card-header"><h5>Identite</h5></div>
      <div class="card-body">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">
              Nom <span style="color:red">*</span>
            </label>
            <input type="text" name="nom" class="form-control"
                   placeholder="NOM (majuscules)" required>
          </div>
          <div class="form-group">
            <label class="form-label">
              Prenom <span style="color:red">*</span>
            </label>
            <input type="text" name="prenom" class="form-control"
                   placeholder="Prenom" required>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Sexe</label>
            <select name="sexe" class="form-control">
              <option value="M">Masculin</option>
              <option value="F">Feminin</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Redoublant</label>
            <select name="redoublant" class="form-control">
              <option value="0">Non</option>
              <option value="1">Oui</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Date de naissance</label>
            <input type="date" name="date_naissance" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Lieu de naissance</label>
            <input type="text" name="lieu_naissance" class="form-control"
                   placeholder="Ville, pays">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Photo</label>
          <input type="file" name="photo" class="form-control"
                 accept="image/*">
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:16px">

      <div class="card">
        <div class="card-header"><h5>Inscription</h5></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">
              Salle de classe <span style="color:red">*</span>
            </label>
            <select name="salle_id" class="form-control" required>
              <option value="">Choisir une salle...</option>
              {% for s in salles %}
              <option value="{{ s.pk }}">
                {{ s.nom }} — {{ s.niveau.nom }}
                ({{ s.effectif }}/{{ s.capacite }})
              </option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h5>Contact urgence</h5></div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Nom contact urgence</label>
            <input type="text" name="contact_urgence" class="form-control"
                   placeholder="Ex: Tante Marie">
          </div>
          <div class="form-group">
            <label class="form-label">Telephone urgence</label>
            <input type="text" name="telephone_urgence" class="form-control"
                   placeholder="+228XXXXXXXX">
          </div>
        </div>
      </div>

    </div>
  </div>

  <div style="margin-top:20px;display:flex;gap:10px">
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-save"></i> Inscrire l'eleve
    </button>
    <a href="{% url 'liste_eleves' %}" class="btn btn-secondary">
      Annuler
    </a>
  </div>
</form>
{% endblock %}
