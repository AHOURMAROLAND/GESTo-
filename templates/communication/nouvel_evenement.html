{% extends 'base.html' %}
{% block title %}Nouvel evenement{% endblock %}
{% block page_title %}Nouvel evenement{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>Nouvel evenement</h1></div>
  <a href="{% url 'calendrier' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Retour
  </a>
</div>

<div class="card" style="max-width:560px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">
          Titre <span style="color:red">*</span>
        </label>
        <input type="text" name="titre" class="form-control"
               placeholder="Ex: Fete nationale, Vacances de Noel..."
               required>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select name="type" class="form-control">
          {% for code, label in types %}
          <option value="{{ code }}">{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">
            Date debut <span style="color:red">*</span>
          </label>
          <input type="date" name="date_debut" class="form-control"
                 required>
        </div>
        <div class="form-group">
          <label class="form-label">Date fin (optionnel)</label>
          <input type="date" name="date_fin" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="Details de l'evenement..."></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-calendar-plus"></i> Ajouter
        </button>
        <a href="{% url 'calendrier' %}" class="btn btn-secondary">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
