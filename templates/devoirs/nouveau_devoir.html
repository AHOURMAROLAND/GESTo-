{% extends 'base.html' %}
{% block title %}Nouveau devoir{% endblock %}
{% block page_title %}Publier un devoir{% endblock %}
{% block content %}
<div class="page-header">
  <div><h1>Nouveau devoir</h1></div>
  <a href="{% url 'liste_devoirs' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Retour
  </a>
</div>

<div class="card" style="max-width:680px">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">
          Titre <span style="color:red">*</span>
        </label>
        <input type="text" name="titre" class="form-control"
               placeholder="Ex: Devoir maison N°1..." required>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select name="type" class="form-control">
            {% for code, label in types %}
            <option value="{{ code }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Note sur</label>
          <select name="note_sur" class="form-control">
            <option value="20">20</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">
          Matiere et classe <span style="color:red">*</span>
        </label>
        <select name="matiere_salle_id" class="form-control" required>
          <option value="">Choisir...</option>
          {% for ms in matieres %}
          <option value="{{ ms.pk }}">
            {{ ms.matiere.nom }} — {{ ms.salle.nom }}
            ({{ ms.salle.niveau.nom }})
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">
          Description / Enonce <span style="color:red">*</span>
        </label>
        <textarea name="description" class="form-control" rows="5"
                  required
                  placeholder="Decrivez le travail demande..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">
          Date limite <span style="color:red">*</span>
        </label>
        <input type="date" name="date_limite" class="form-control"
               required min="{{ today }}">
      </div>
      <div class="form-group">
        <label class="form-label">
          Fichier joint (optionnel)
        </label>
        <input type="file" name="fichier_joint" class="form-control">
        <p style="font-size:12px;color:var(--text-muted);margin-top:4px">
          PDF, Word, images... Max 10 Mo
        </p>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-paper-plane"></i> Publier le devoir
        </button>
        <a href="{% url 'liste_devoirs' %}" class="btn btn-secondary">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
